{{template "base" .}}
{{define "content"}}


<div class="container">
    <div class="row justify-content-center">
        <div class="col-8 col-lg-4">
            <h2 class="text-center my-5">Create an account</h2>
            <!-- Error messages -->

            {{ if .RegMsgs.TakenEmail}}
            <div class="alert alert-danger alert-dismissible" role="alert">
                Email already exists!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {{ end}}

            {{ if .RegMsgs.TakenUn}}
            <div class="alert alert-danger alert-dismissible" role="alert">
                Username already exists!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {{ end}}

            {{ if .RegMsgs.PswrdsNotEq}}
            <div class="alert alert-danger alert-dismissible" role="alert">
                Passwords dont match!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {{ end}}

            <!-- <div class="mb-2">
                <small class="text-white-50">Register with the following options</small>
            </div>
            <div class="d-flex gap-2 mb-4">


                <a href="https://accounts.google.com/o/oauth2/auth?scope=email&access_type=offline&include_granted_scopes=true&response_type=code&state=google&redirect_uri=http://localhost:8000/oauth/google&client_id=951994704443-ua3fhj8ctamuc194ejgfpjqc4s941l8v.apps.googleusercontent.com&prompt=select_account"
                    class="btn btn-dark text-decoration-none text-white flex-fill"><i class="fab fa-google"></i> Google
                </a>

                <a href="https://github.com/login/oauth/authorize?client_id=89a08fe8e784eb5f72be&redirect_uri=http://localhost:8000/oauth/github&scope=user&allow_signup=true"
                    class="btn btn-dark text-decoration-none text-white flex-fill"><i class="fab fa-github"></i>
                    Github</a>
            </div> -->
            <form action="/registerauth" method="post">


                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="username" name="username" id="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label for="password2" class="form-label">Retype password</label>
                    <input type="password" name="password2" id="password2" class="form-control" required>
                </div>



                <div class="d-grid">
                    <button class="btn btn-dark float-end" type="submit">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>

{{end}}
